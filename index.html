<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algerian Poker - 32 Card Poker</title>
    <style>
        :root {
            --bg: #0f172a;
            --bg-sec: #1e1b4b; /* midnight blue */
            --felt: #065f46; /* emerald green */
            --gold: #fbbf24;
            --gold-light: rgba(251, 191, 36, 0.2);
            --primary: #4338ca;
            --primary-hover: #3730a3;
            --text: #f8fafc;
            --text-sec: #94a3b8;
            --border: #312e81;
            --red: #ef4444;
            --green: #10b981;
            --cw: 70px;
            --ch: 100px;
            --cr: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Screens --- */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0;
        }
        .screen.active { display: flex; }

        /* --- Menu Screen --- */
        .menu-title { font-size: 4rem; font-weight: 900; margin-bottom: 2rem; color: var(--gold); text-shadow: 0 0 20px var(--gold-light); letter-spacing: -2px; }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 0.5rem;
            transition: 0.2s;
            min-width: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn:hover { transform: translateY(-2px); background: var(--primary-hover); box-shadow: 0 6px 12px rgba(59, 130, 246, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn-gold { background: var(--gold); color: black; }
        .btn-gold:hover { background: #d97706; }
        .btn-red { background: var(--red); }
        .btn-red:hover { background: #dc2626; }
        .btn-sm { padding: 0.5rem 1rem; min-width: auto; font-size: 0.9rem; }

        .audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
        }
        .audio-control:hover { background: var(--gold); color: black; }

        /* --- Table Screen --- */
        #screen-game { background-color: #020617; }
        #game-header {
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-sec);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .pot-display {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 50%;
            border: 4px double var(--gold);
            width: 140px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 0 20px var(--gold-light);
            z-index: 10;
        }

        #game-table {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 60%;
            background: radial-gradient(circle, var(--felt) 0%, #064e3b 100%);
            border: 12px solid #3f2a1d;
            border-radius: 200px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.7), 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            /* Embroidery Pattern on Rim */
            outline: 4px solid var(--gold);
            outline-offset: -8px;
        }
        #game-table::before {
            content: "";
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            border-radius: 200px;
            border: 8px solid transparent;
            border-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20L20 0L40 20L20 40Z' fill='none' stroke='%23fbbf24' stroke-width='2'/%3E%3C/svg%3E") 20 round;
            pointer-events: none;
        }

        .table-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            color: rgba(251, 191, 36, 0.05);
            pointer-events: none;
            z-index: 1;
        }

        .player-pos {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        .p-0 { bottom: -40px; left: 50%; transform: translateX(-50%); } /* You */
        .p-1 { left: -60px; top: 50%; transform: translateY(-50%); }
        .p-2 { top: -40px; left: 50%; transform: translateX(-50%); }
        .p-3 { right: -60px; top: 50%; transform: translateY(-50%); }

        .player-card {
            background: var(--bg-sec);
            border: 2px solid var(--border);
            border-radius: 1rem;
            padding: 12px;
            width: 120px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            position: relative;
            transition: 0.3s;
        }
        .p-0 .player-card { width: 160px; padding: 16px; } /* Larger footprint for You */
        .player-card.active { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); animation: active-glow 1s infinite alternate; }
        @keyframes active-glow { from { box-shadow: 0 0 10px var(--gold); } to { box-shadow: 0 0 25px var(--gold); } }
        .player-card.eliminated { opacity: 0.5; filter: grayscale(1); }

        .avatar { width: 50px; height: 50px; background: #334155; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 2px solid var(--border); }
        .name { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
        .money { color: var(--gold); font-weight: 800; font-size: 1.1rem; }
        .profit { font-weight: 700; font-size: 0.85rem; margin-top: 2px; }
        .profit-plus { color: #10b981; }
        .profit-minus { color: #ef4444; }
        .profit-zero { color: #94a3b8; }

        .dealer-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--gold);
            color: black;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 900;
            box-shadow: 0 0 10px var(--gold);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- Cards --- */
        .hand { display: flex; gap: 4px; margin-top: 15px; perspective: 1000px; height: var(--ch); justify-content: center; }
        .card {
            width: var(--cw);
            height: var(--ch);
            background: white;
            border-radius: var(--cr);
            color: black;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            font-weight: 900;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .card .top-left { align-self: flex-start; font-size: 1.2rem; line-height: 1; }
        .card .bottom-right { align-self: flex-end; font-size: 1.2rem; line-height: 1; transform: rotate(180deg); }
        .card .suit-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.2rem; opacity: 0.8; }

        .card.back {
            background-color: #b91c1c;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 10L10 0L20 10L10 20Z' fill='%23fbbf24' fill-opacity='0.2'/%3E%3C/svg%3E");
            color: transparent;
            border: 3px solid white;
        }
        .card.back::after {
            content: 'ⵣ';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fbbf24;
            font-size: 2rem;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .card.red { color: var(--red); }
        .card.selected { transform: translateY(-25px); border: 4px solid var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px var(--gold-light); }

        /* --- Center Zone --- */
        .center-zone { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .phase-text { font-size: 1.5rem; font-weight: 900; color: var(--gold); text-transform: uppercase; letter-spacing: 4px; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .timer-circle {
            width: 80px; height: 80px;
            border: 4px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-sec);
            background: rgba(0,0,0,0.2);
            position: relative;
        }
        .timer-circle svg { position: absolute; top: -4px; left: -4px; width: 80px; height: 80px; transform: rotate(-90deg); }
        .timer-circle circle { fill: none; stroke: var(--gold); stroke-width: 4; stroke-dasharray: 238; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }

        /* --- Buttons Panel --- */
        .controls {
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: var(--bg-sec);
            border-top: 1px solid var(--border);
            min-height: 100px;
        }

        /* --- History Panel --- */
        #history-panel {
            position: fixed;
            right: 0; top: 0;
            width: 320px;
            height: 100%;
            background: #0f172a;
            border-left: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #history-panel.open { transform: translateX(0); }
        #history-panel h3 { margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; color: var(--gold); }
        .history-list { overflow-y: auto; flex: 1; list-style: none; padding-right: 10px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .history-item { font-size: 0.9rem; padding: 10px 0; border-bottom: 1px solid var(--border); color: var(--text-sec); line-height: 1.4; }
        .history-item b { color: var(--text); }
        .history-item .val { color: var(--gold); font-weight: 800; }

        /* --- Toasts --- */
        #toast-container { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .toast {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 6px solid var(--gold);
            font-weight: 600;
            font-size: 1.1rem;
        }
        @keyframes toastIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- UI Components --- */
        .badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; font-weight: 900; text-transform: uppercase; margin-top: 5px; display: inline-block; }
        .bg-red { background: var(--red); color: white; }
        .bg-gold { background: var(--gold); color: black; }
        .bg-blue { background: var(--primary); color: white; }

        /* --- Animations --- */
        .chip-fly {
            position: absolute;
            width: 20px; height: 20px;
            background: var(--gold);
            border: 2px dashed white;
            border-radius: 50%;
            z-index: 100;
            box-shadow: 0 0 10px var(--gold);
        }

        .win-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 2rem 4rem;
            border-radius: 2rem;
            border: 4px solid var(--gold);
            text-align: center;
            z-index: 200;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .hidden { display: none !important; }

        /* Room Screen */
        .room-code { font-size: 2.5rem; font-weight: 900; color: var(--gold); background: var(--bg-sec); padding: 10px 30px; border-radius: 12px; margin: 1rem 0; border: 2px solid var(--border); }
    </style>
</head>
<body onclick="audio.init()">

<div class="audio-control" onclick="audio.toggleMusic()">
    <span id="music-toggle-icon">🔇</span>
</div>

<div id="app">
    <!-- Menu Screen -->
    <div id="screen-menu" class="screen active">
        <h1 class="menu-title">KABYLE POKER</h1>
        <button class="btn btn-primary" onclick="audio.mechanicalClick(); game.startSetup('cpu')">🕹️ Play vs Computer</button>
        <button class="btn btn-gold" onclick="audio.mechanicalClick(); game.startSetup('online')">🌐 Play Online</button>
    </div>

    <!-- Setup Screen -->
    <div id="screen-setup" class="screen">
        <button class="btn btn-sm btn-red" style="position: absolute; top: 20px; left: 20px; min-width: auto;" onclick="audio.mechanicalClick(); ui.showScreen('screen-menu')">↩ Back</button>
        <h2 class="menu-title" style="font-size: 2.5rem;">Player Count</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 2rem;">
            <button class="btn btn-sm" onclick="audio.mechanicalClick(); game.setupPlayers(2)">2 Players</button>
            <button class="btn btn-sm" onclick="audio.mechanicalClick(); game.setupPlayers(3)">3 Players</button>
            <button class="btn btn-sm" onclick="audio.mechanicalClick(); game.setupPlayers(4)">4 Players</button>
        </div>
        <button class="btn btn-red btn-sm" onclick="audio.mechanicalClick(); game.goHome()">Return to Menu</button>
    </div>

    <!-- Online Lobby Screen -->
    <div id="screen-lobby" class="screen">
        <h2 class="menu-title" style="font-size: 2.5rem;">Online Multiplayer</h2>

        <div id="lobby-join" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <button class="btn btn-gold" onclick="audio.mechanicalClick(); multiplayer.createRoom()">Create New Room</button>
            <p>OR</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="join-code" placeholder="Enter Code" class="btn btn-sm" style="background: white; color: black; min-width: 150px; text-align: center; text-transform: uppercase;">
                <button class="btn btn-sm" onclick="audio.mechanicalClick(); multiplayer.joinRoom()">Join Room</button>
            </div>
        </div>

        <div id="lobby-waiting" class="hidden" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <button class="btn btn-sm btn-red" style="position: absolute; top: 20px; left: 20px; min-width: auto;" onclick="audio.mechanicalClick(); multiplayer.leave()">❌ Quit Room</button>
            <p>Room Code:</p>
            <div class="room-code" id="display-room-code">------</div>
            <p id="lobby-status">Waiting for players (1/4)...</p>
            <div id="lobby-players-list" style="margin: 1rem 0; display: flex; gap: 10px;"></div>
            <button id="btn-start-multi" class="btn btn-gold hidden" onclick="audio.mechanicalClick(); multiplayer.requestStart()">Start Game</button>
        </div>

        <button class="btn btn-red btn-sm" style="margin-top: 2rem;" onclick="audio.mechanicalClick(); multiplayer.leave()">Back to Menu</button>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen">
        <div id="game-header">
            <button class="btn btn-red btn-sm" style="min-width: 100px;" onclick="audio.mechanicalClick(); game.confirmQuit()">🏠 Home</button>
            <div style="font-size: 1.5rem; font-weight: 900; color: var(--gold);">KABYLE POKER</div>
            <button class="btn btn-primary btn-sm" style="min-width: 100px;" onclick="audio.mechanicalClick(); ui.toggleHistory()">History</button>
        </div>

        <div id="game-table">
            <div class="table-watermark">ⵣ</div>
            <div class="center-zone">
                <div id="current-phase" class="phase-text">IDLE</div>
                <div class="pot-display">
                    <div style="font-size: 0.8rem; opacity: 0.8;">POT</div>
                    <div id="pot-amount">$0.00</div>
                </div>
                <div class="timer-circle">
                    <svg><circle id="timer-svg" cx="40" cy="40" r="38"></circle></svg>
                    <span id="timer-display">180</span>
                </div>
            </div>

            <div id="player-positions">
                <div id="p-0" class="player-pos p-0"></div>
                <div id="p-1" class="player-pos p-1"></div>
                <div id="p-2" class="player-pos p-2"></div>
                <div id="p-3" class="player-pos p-3"></div>
            </div>

            <div id="win-overlay" class="win-overlay hidden">
                <h2 style="color: var(--gold); font-size: 2rem;">🏆 WINNER!</h2>
                <div id="win-player-name" style="font-size: 1.5rem; margin: 0.5rem 0;">Player X</div>
                <div id="win-hand-name" style="color: var(--text-sec); margin-bottom: 1rem;">FULL HOUSE</div>
                <div id="win-amount" style="font-size: 2.5rem; color: var(--gold); font-weight: 800;">+$50</div>
            </div>
        </div>

        <div id="player-controls" class="controls"></div>
    </div>
</div>

<div id="history-panel">
    <h3>Action History</h3>
    <ul id="history-list" class="history-list"></ul>
    <button class="btn btn-primary btn-sm" style="width: 100%; margin-top: 1rem;" onclick="audio.mechanicalClick(); ui.toggleHistory()">Close</button>
</div>

<div id="toast-container"></div>

<script>
    // --- Constants & Config ---
    const SUITS = ['♠', '♥', '♦', '♣'];
    const RANKS = ['7', '8', '9', '10', 'J', 'Q', 'K', 'A'];
    const RANK_VALUES = { '7': 7, '8': 8, '9': 9, '10': 10, 'J': 11, 'Q': 12, 'K': 13, 'A': 14 };
    const HAND_SIZE = 5;

    // --- Audio System ---
    const audio = {
        ctx: null,
        isMuted: true,
        bgmTimeout: null,
        noiseBuffer: null,
        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.createNoiseBuffer();
        },
        createNoiseBuffer() {
            const bufferSize = 2 * this.ctx.sampleRate;
            this.noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const output = this.noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
        },
        toggleMusic() {
            this.isMuted = !this.isMuted;
            const icon = document.getElementById('music-toggle-icon');
            if (icon) icon.textContent = this.isMuted ? '🔇' : '🎵';
            if (!this.isMuted) this.playBGM();
            else clearTimeout(this.bgmTimeout);
        },
        playBGM() {
            if (this.isMuted || game.state === 'IDLE') return;
            const tempo = 120; // BPM
            const eighthNote = 60 / tempo / 2;
            let beat = 0;

            const bassPattern = [110, 138.59, 164.81, 123.47]; // A2, C#3, E3, B2
            const rhodesPattern = [
                [220, 277.18, 329.63], // Amaj
                [220, 277.18, 329.63],
                [220, 277.18, 329.63],
                [220, 277.18, 329.63]
            ];

            const loop = () => {
                if (this.isMuted || game.state === 'IDLE') return;

                // Bass on every beat
                if (beat % 2 === 0) {
                    this.playBass(bassPattern[(beat / 2) % bassPattern.length], eighthNote * 1.5);
                }

                // Rhodes on beat 1 and 3
                if (beat % 4 === 0) {
                    const chord = rhodesPattern[(beat / 4) % rhodesPattern.length];
                    chord.forEach(freq => this.playRhodes(freq, eighthNote * 4));
                }

                // Brush swing pattern
                if (beat % 2 === 0) {
                    this.playBrush(0.05); // Downbeat
                } else {
                    this.playBrush(0.02); // Upbeat (swing)
                }

                beat++;
                this.bgmTimeout = setTimeout(loop, eighthNote * 1000);
            };
            loop();
        },
        playBass(freq, duration, vol = 0.2) {
            try {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            } catch(e) {}
        },
        playRhodes(freq, duration, vol = 0.1) {
            try {
                this.init();
                const osc1 = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc1.type = 'sine';
                osc2.type = 'square';
                osc1.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc2.frequency.setValueAtTime(freq * 2.01, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(this.ctx.destination);
                osc1.start();
                osc2.start();
                osc1.stop(this.ctx.currentTime + duration);
                osc2.stop(this.ctx.currentTime + duration);
            } catch(e) {}
        },
        playBrush(vol = 0.05) {
            try {
                this.init();
                const source = this.ctx.createBufferSource();
                const filter = this.ctx.createBiquadFilter();
                const gain = this.ctx.createGain();
                source.buffer = this.noiseBuffer;
                filter.type = 'highpass';
                filter.frequency.value = 5000;
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
                source.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                source.start();
            } catch(e) {}
        },
        mechanicalClick() {
            try {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            } catch(e) {}
        },
        play(freq, type, duration, vol = 0.1) {
            try {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            } catch(e) {}
        },
        tick() { this.play(800, 'sine', 0.05, 0.02); },
        ding() { this.play(1200, 'sine', 0.2, 0.05); },
        coin() { this.play(2000, 'sine', 0.1, 0.03); setTimeout(() => this.play(2200, 'sine', 0.1, 0.03), 50); },
        card() { this.play(400, 'square', 0.1, 0.01); },
        whoosh() { this.play(150, 'sawtooth', 0.4, 0.05); },
        win() {
            const now = this.ctx.currentTime;
            [440, 554, 659, 880].forEach((f, i) => {
                setTimeout(() => this.play(f, 'sine', 0.8, 0.05), i * 150);
            });
        },
        fail() { this.play(100, 'sawtooth', 0.5, 0.1); }
    };

    // --- Core Game Engine ---
    const game = {
        state: 'IDLE',
        mode: 'cpu',
        players: [],
        pot: 0,
        dealerIdx: -1,
        activeIdx: -1,
        deck: [],
        entryAmount: 1,
        currentDealAmount: 0,
        turnTimer: null,
        timeLeft: 180,
        lastRaiserIdx: -1,
        doublerIdx: -1,
        isDoubled: false,
        isDeckCut: false,
        myId: 0,

        startSetup(mode) {
            this.mode = mode;
            if (mode === 'cpu') {
                ui.showScreen('screen-setup');
            } else {
                multiplayer.init();
            }
        },

        setupPlayers(count) {
            this.players = [];
            const names = ['Player 1', 'Player 2', 'Player 3', 'Player 4'];
            const avatars = ['👤', '👤', '👤', '👤'];
            for (let i = 0; i < count; i++) {
                this.players.push({
                    id: i,
                    name: names[i],
                    avatar: avatars[i],
                    isAI: i > 0,
                    money: 10,
                    startingMoney: 10,
                    hand: [],
                    isActive: true,
                    isOut: false,
                    isEliminated: false,
                    hasCut: false,
                    hasRaisedThisTurn: false,
                    paidThisRound: 0,
                    totalContributed: 0,
                    status: '',
                    cardsToChange: []
                });
            }
            this.myId = 0;
            ui.showScreen('screen-game');
            this.initRound();
        },

        initRound(keepPot = false) {
            this.state = 'DEALER_SELECT';
            if (!keepPot) this.pot = 0;
            this.entryAmount = 1;
            this.currentDealAmount = 0;
            this.highestPreGameBet = 1; // Dealer ante
            this.lastRaiserIdx = -1;
            this.doublerIdx = -1;
            this.isDoubled = false;
            this.isDeckCut = false;
            this.cutQueued = false;
            this.isAnimating = false;

            this.players.forEach(p => {
                p.hand = [];
                p.isOut = false;
                p.hasCut = false;
                p.hasRaisedThisTurn = false;
                p.paidThisRound = 0;
                p.totalContributed = 0;
                p.status = '';
                p.cardsToChange = [];
                if (p.money <= 0) p.isEliminated = true;
            });

            // Check if game over
            const activeCount = this.players.filter(p => !p.isEliminated).length;
            if (activeCount < 2) {
                this.gameOver();
                return;
            }

            ui.renderTable();
            this.dealerSelect();
        },

        async dealerSelect() {
            if (this.dealerIdx === -1) {
                ui.updatePhase('Selecting Dealer');
                let spinIdx = Math.floor(Math.random() * this.players.length);
                const spins = 15 + Math.floor(Math.random() * 10);
                for (let i = 0; i < spins; i++) {
                    spinIdx = (spinIdx + 1) % this.players.length;
                    while (this.players[spinIdx].isEliminated) spinIdx = (spinIdx + 1) % this.players.length;
                    ui.highlightPlayer(spinIdx);
                    audio.tick();
                    await new Promise(r => setTimeout(r, 100 + (i * 15)));
                }
                this.dealerIdx = spinIdx;
            } else {
                this.dealerIdx = this.getNextActive(this.dealerIdx);
            }
            audio.ding();
            ui.toast(`🎯 ${this.players[this.dealerIdx].name} is Dealer`);
            ui.renderTable();

            setTimeout(() => this.dealerForcedBet(), 1500);
        },

        dealerForcedBet() {
            this.state = 'DEALER_FORCED_BET';
            const dealer = this.players[this.dealerIdx];
            this.payMoney(dealer, 1);
            ui.toast(`🎯 Dealer pays $1`);
            ui.renderTable();

            setTimeout(() => this.preDealPhase(), 1000);
        },

        preDealPhase() {
            this.state = 'PRE_DEAL';
            ui.updatePhase('Pre-Deal Actions');
            this.canRaiseChain = true;
            this.activeIdx = this.getNextActive(this.dealerIdx);
            const turnOrder = [];
            let curr = this.activeIdx;
            const activePlayers = this.players.filter(p=>!p.isEliminated);
            for(let i=0; i<activePlayers.length; i++) {
                turnOrder.push(curr);
                curr = this.getNextActive(curr);
            }
            this.turnOrder = turnOrder;
            this.turnOrderIdx = 0;
            this.activeIdx = this.turnOrder[0];
            this.startTurn();
        },

        startTurn() {
            ui.highlightPlayer(this.activeIdx);
            this.resetTimer();
            if (this.players[this.activeIdx].isAI) {
                setTimeout(() => this.aiAction(), 1000 + Math.random() * 1000);
            } else if (this.players[this.activeIdx].id === this.myId) {
                ui.renderControls();
            }
        },

        resetTimer() {
            clearInterval(this.turnTimer);
            this.timeLeft = 180;
            ui.updateTimer(this.timeLeft);
            this.turnTimer = setInterval(() => {
                this.timeLeft--;
                ui.updateTimer(this.timeLeft);
                if (this.timeLeft <= 0) {
                    clearInterval(this.turnTimer);
                    this.autoAction();
                }
            }, 1000);
        },

        autoAction() {
            const p = this.players[this.activeIdx];
            if (this.state === 'BETTING' && this.currentDealAmount > 0) {
                this.action('out');
            } else {
                this.action('skip');
            }
        },

        async action(type, val = 0, isRemote = false) {
            if (this.isAnimating) return;
            if (this.mode === 'online' && !isRemote && this.activeIdx === this.myId) {
                multiplayer.send({ type: 'game_action', action: type, val: val, pIdx: this.myId });
            }
            const p = this.players[this.activeIdx];
            if (type === 'skip') {
                ui.toast(`⏭️ ${p.name} SKIPPED`);
                if (this.state === 'PRE_DEAL') this.canRaiseChain = false;
            } else if (type === 'cut') {
                this.isDeckCut = true;
                this.cutQueued = true;
                p.hasCut = true;
                // No actual deck cut until dealCards because deck is generated there
                ui.toast(`✂️ ${p.name} CUT the deck`);
                this.isAnimating = true;
                ui.renderTable();
                await ui.animateCut();
                this.isAnimating = false;
            } else if (type === 'double') {
                this.isDoubled = true;
                this.doublerIdx = this.activeIdx;
                this.entryAmount *= 2;
                this.highestPreGameBet *= 2;
                ui.toast(`💰 ${p.name} DOUBLED to $${this.entryAmount}`);
                audio.ding();
            } else if (type === 'raise_pre') {
                const amount = val || (p.isAI ? Math.floor(Math.random() * 3) + 1 : 1);
                this.payMoney(p, amount);
                this.lastRaiserIdx = this.activeIdx;
                p.hasRaisedThisTurn = true;
                this.highestPreGameBet = p.paidThisRound;
                ui.toast(`💰 ${p.name} RAISED pot by $${amount}`);
                audio.ding();
                if (this.state === 'PRE_DEAL') {
                    ui.renderTable();
                    if (p.isAI) {
                        setTimeout(() => this.aiAction(), 1000);
                    }
                    return;
                }
            } else if (type === 'distribute') {
                this.dealCards();
                return;
            } else if (type === 'out') {
                p.isOut = true;
                p.status = 'OUT';
                ui.toast(`❌ ${p.name} is OUT`);
                audio.whoosh();
                ui.animateFold(this.activeIdx);
            } else if (type === 'pay') {
                const diff = this.entryAmount - p.paidThisRound;
                if (diff > 0) this.payMoney(p, diff);
                ui.toast(`✅ ${p.name} PAYS`);
            } else if (type === 'change') {
                p.cardsToChange = val; // array of indices
                this.executeChange(p);
                return;
            } else if (type === 'keep') {
                this.executeChange(p);
                return;
            } else if (type === 'pass_bet') {
                ui.toast(`⏭️ ${p.name} PASS`);
            } else if (type === 'deal_bet') {
                this.payMoney(p, val);
                this.currentDealAmount = val;
                this.lastRaiserIdx = this.activeIdx;
                ui.toast(`💰 ${p.name} BET $${val}`);
            } else if (type === 'call_bet') {
                const diff = this.currentDealAmount - p.paidThisRound;
                this.payMoney(p, diff);
                ui.toast(`✅ ${p.name} CALLS`);
            } else if (type === 'raise_bet') {
                const totalBet = this.currentDealAmount + val;
                const diff = totalBet - p.paidThisRound;
                this.payMoney(p, diff);
                this.currentDealAmount = totalBet;
                this.lastRaiserIdx = this.activeIdx;
                ui.toast(`💰 ${p.name} RAISED to $${totalBet}`);
            }

            this.nextTurn();
        },

        nextTurn() {
            clearInterval(this.turnTimer);
            if (this.mode === 'online' && multiplayer.isHost) multiplayer.sendState();

            if (this.state === 'PRE_DEAL') {
                this.turnOrderIdx++;
                if (this.turnOrderIdx < this.turnOrder.length) {
                    this.activeIdx = this.turnOrder[this.turnOrderIdx];
                    this.startTurn();
                } else {
                    // Pre-deal finished
                    this.checkDoublePayment();
                }
            } else if (this.state === 'DOUBLE_PAYMENT') {
                this.activeIdx = this.getNextActive(this.activeIdx);
                if (this.activeIdx === this.firstToPayIdx) {
                    this.dealerDecision();
                } else {
                    this.startTurn();
                }
            } else if (this.state === 'CHANGE_CARDS') {
                this.activeIdx = this.getNextActive(this.activeIdx);
                while (this.players[this.activeIdx].isOut) this.activeIdx = this.getNextActive(this.activeIdx);

                if (this.activeIdx === this.firstTalkerIdx) {
                    this.bettingPhase();
                } else {
                    this.startTurn();
                }
            } else if (this.state === 'BETTING') {
                // More complex: keep going until everyone called or is out
                this.activeIdx = this.getNextActive(this.activeIdx);
                if (this.checkBettingFinished()) {
                    this.showdownPhase();
                } else {
                    this.startTurn();
                }
            }
        },

        checkDoublePayment() {
            if (this.isDoubled) {
                this.state = 'DOUBLE_PAYMENT';
                ui.updatePhase('Payment Required');
                this.firstToPayIdx = this.getNextActive(this.dealerIdx);
                this.activeIdx = this.firstToPayIdx;
                this.startTurn();
            } else {
                this.dealerDecision();
            }
        },

        dealerDecision() {
            this.state = 'DEALER_DECISION';
            this.activeIdx = this.dealerIdx;
            ui.updatePhase('Dealer Decision');
            this.startTurn();
        },

        async dealCards() {
            this.state = 'DEALING';
            ui.updatePhase('Dealing...');
            ui.renderControls(); // Hide controls

            this.deck = this.generateDeck();
            this.shuffle(this.deck);
            if (this.cutQueued) {
                this.cutDeck(this.deck);
            }

            // Deal 5 cards each
            for (let c = 0; c < HAND_SIZE; c++) {
                let curr = this.getNextActive(this.dealerIdx);
                const activeCount = this.players.filter(p => !p.isEliminated).length;
                for (let i = 0; i < activeCount; i++) {
                    const p = this.players[curr];
                    const card = this.deck.pop();
                    // Punishment: If someone cut, Dealer's 1st card is face-up
                    if (c === 0 && i === (activeCount - 1) && this.cutQueued) card.faceUp = true;
                    p.hand.push(card);
                    audio.card();
                    ui.renderTable();
                    await new Promise(r => setTimeout(r, 600));
                    curr = this.getNextActive(curr);
                }
            }

            this.changeCardsPhase();
            if (this.mode === 'online' && multiplayer.isHost) multiplayer.sendState();
        },

        changeCardsPhase() {
            this.state = 'CHANGE_CARDS';
            ui.updatePhase('Change Cards');
            this.activeIdx = this.getNextActive(this.dealerIdx);
            while(this.players[this.activeIdx].isOut) this.activeIdx = this.getNextActive(this.activeIdx);
            this.startTurn();
        },

        async executeChange(p) {
            const count = p.cardsToChange.length;
            // Equalizer Math: Deduction = (Highest Pre-Game Bet) - (Already Paid)
            const diff = this.highestPreGameBet - p.paidThisRound;
            if (diff > 0) this.payMoney(p, diff);

            if (count > 0) {

                // Discard
                p.cardsToChange.sort((a,b) => b-a).forEach(idx => {
                    p.hand.splice(idx, 1);
                });
                audio.whoosh();
                ui.renderTable();
                await new Promise(r => setTimeout(r, 800));

                // Draw
                for(let i=0; i<count; i++) {
                    p.hand.push(this.deck.pop());
                    audio.card();
                    ui.renderTable();
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            this.nextTurn();
        },

        bettingPhase() {
            this.state = 'BETTING';
            ui.updatePhase('Betting Round');
            this.currentDealAmount = 0;
            this.players.forEach(p => p.paidThisRound = 0); // Reset for this round

            if (this.lastRaiserIdx !== -1) {
                this.activeIdx = this.lastRaiserIdx;
            } else {
                this.activeIdx = this.getNextActive(this.dealerIdx);
            }
            this.firstTalkerIdx = this.activeIdx;

            while(this.players[this.activeIdx].isOut) this.activeIdx = this.getNextActive(this.activeIdx);
            this.lastRaiserIdx = -1;
            this.startTurn();
        },

        checkBettingFinished() {
            const active = this.players.filter(p => !p.isEliminated && !p.isOut);
            if (active.length <= 1) return true;

            // If no bet yet, and everyone passed
            if (this.currentDealAmount === 0) {
                // We need to track who passed. Simplification: if we came back to first talker
                // Actually, let's just use a counter or lastRaiserIdx
                if (this.activeIdx === this.firstTalkerIdx && this.lastRaiserIdx === -1) {
                    this.noBetRestart();
                    return false; // Handled by noBetRestart
                }
            }

            // Everyone called the highest bet
            const allMatched = active.every(p => p.paidThisRound === this.currentDealAmount);
            if (this.currentDealAmount > 0 && allMatched && this.activeIdx === this.getNextActive(this.lastRaiserIdx)) {
                return true;
            }

            return false;
        },

        noBetRestart() {
            ui.toast("📦 All Pass - Pot rolls over");
            this.players.forEach(p => {
                p.hand.forEach(c => c.faceUp = false); // Ensure hidden
            });
            setTimeout(() => this.initRound(true), 2000);
        },

        async showdownPhase() {
            this.state = 'SHOWDOWN';
            ui.updatePhase('Showdown!');
            audio.ding();

            const active = this.players.filter(p => !p.isEliminated && !p.isOut);
            for (let p of active) {
                ui.highlightPlayer(p.id);
                for (let card of p.hand) {
                    card.faceUp = true;
                    audio.card();
                    ui.renderTable();
                    await new Promise(r => setTimeout(r, 300));
                }
                const res = this.evaluateHand(p.hand);
                p.finalHand = res;
                ui.toast(`⚔️ ${p.name} has ${res.name}`);
                await new Promise(r => setTimeout(r, 800));
            }

            if (this.mode === 'online' && !multiplayer.isHost) return; // Only host determines winner
            this.determineWinner();
        },

        determineWinner() {
            const playersByHand = this.players
                .filter(p => !p.isEliminated && !p.isOut)
                .sort((a,b) => this.compareHands(b.finalHand, a.finalHand));

            this.state = 'WINNER';
            const primaryWinner = playersByHand[0];
            ui.showWin(primaryWinner); // Primary winner display
            audio.win();

            // Universal Side Pot Logic: "You can only win what you match."
            let remainingPot = this.pot;

            // Collect all contributions
            const contributions = this.players.map(p => ({ id: p.id, amount: p.totalContributed }));

            playersByHand.forEach(winner => {
                const winnerPaid = contributions.find(c => c.id === winner.id).amount;
                if (winnerPaid <= 0) return;

                let winnableFromThisPot = 0;
                contributions.forEach(c => {
                    const take = Math.min(c.amount, winnerPaid);
                    winnableFromThisPot += take;
                    c.amount -= take;
                });

                if (winnableFromThisPot > 0) {
                    winner.money += winnableFromThisPot;
                    remainingPot -= winnableFromThisPot;
                }
            });

            // If any pot remains (all active folded or logic edge case), give to absolute winner
            if (remainingPot > 0) {
                primaryWinner.money += remainingPot;
                ui.animateChips('pot', primaryWinner.id);
            }

            this.pot = 0;
            ui.renderTable();
            setTimeout(() => this.checkEliminations(), 4000);
        },

        checkEliminations() {
            this.players.forEach(p => {
                if (!p.isEliminated && p.money <= 0) {
                    p.isEliminated = true;
                    ui.toast(`💀 ${p.name} ELIMINATED!`);
                    audio.fail();
                }
            });

            const remaining = this.players.filter(p => !p.isEliminated);
            if (remaining.length === 1) {
                this.gameOver(remaining[0]);
            } else {
                this.initRound();
            }
            if (this.mode === 'online' && multiplayer.isHost) multiplayer.sendState();
        },

        gameOver(winner) {
            this.state = 'GAME_OVER';
            if (winner) {
                ui.updatePhase('Game Over');
                ui.toast(`🏆 ${winner.name} WINS THE GAME!`);
                audio.win();
            } else {
                ui.updatePhase('Game Over');
            }
            setTimeout(() => this.goHome(), 5000);
        },

        // --- Utils ---
        generateDeck() {
            const d = [];
            SUITS.forEach(s => RANKS.forEach(r => d.push({ suit: s, rank: r, value: RANK_VALUES[r], faceUp: false, color: (s==='♥'||s==='♦') ? 'red' : '' })));
            return d;
        },
        shuffle(d) {
            for (let i = d.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [d[i], d[j]] = [d[j], d[i]];
            }
        },
        cutDeck(d) {
            const mid = Math.floor(d.length / 2);
            const half = d.splice(0, mid);
            d.push(...half);
        },
        getNextActive(idx) {
            let n = (idx + 1) % this.players.length;
            while (this.players[n].isEliminated) n = (n + 1) % this.players.length;
            return n;
        },
        determineFirstTalker() {
            if (this.lastRaiserIdx !== -1) {
                this.firstTalkerIdx = this.lastRaiserIdx;
            } else if (this.doublerIdx !== -1) {
                this.firstTalkerIdx = this.getNextActive(this.doublerIdx);
            } else {
                this.firstTalkerIdx = this.getNextActive(this.dealerIdx);
            }
        },
        payMoney(p, amount) {
            if (amount > p.money) amount = p.money; // All-in safeguard
            if (amount <= 0) return;
            p.money -= amount;
            p.paidThisRound += amount;
            p.totalContributed += amount;
            this.pot += amount;
            audio.coin();
            ui.animateChips(p.id, 'pot');
            ui.renderTable();
            if (this.mode === 'online' && multiplayer.isHost) multiplayer.sendState();
        },
        evaluateHand(cards) {
            const counts = {};
            cards.forEach(c => counts[c.rank] = (counts[c.rank] || 0) + 1);
            const sorted = Object.entries(counts).map(([r, c]) => ({ r, c, v: RANK_VALUES[r] })).sort((a,b) => b.c - a.c || b.v - a.v);
            const cv = sorted.map(x => x.c);
            const vv = sorted.map(x => x.v);

            if (cv[0] === 4) return { rank: 1, name: "FOUR OF A KIND", v: vv[0], k: vv[1] };
            if (cv[0] === 3 && cv[1] === 2) return { rank: 2, name: "FULL HOUSE", v: vv[0], p: vv[1] };
            if (cv[0] === 3) return { rank: 3, name: "THREE OF A KIND", v: vv[0], ks: vv.slice(1) };
            if (cv[0] === 2 && cv[1] === 2) return { rank: 4, name: "TWO PAIR", hp: vv[0], lp: vv[1], k: vv[2] };
            if (cv[0] === 2) return { rank: 5, name: "ONE PAIR", p: vv[0], ks: vv.slice(1) };
            return { rank: 6, name: "HIGH CARD", vs: vv };
        },
        compareHands(h1, h2) {
            if (h1.rank !== h2.rank) return h2.rank - h1.rank;
            if (h1.rank === 1) return h1.v - h2.v || h1.k - h2.k;
            if (h1.rank === 2) return h1.v - h2.v || h1.p - h2.p;
            if (h1.rank === 3) {
                if (h1.v !== h2.v) return h1.v - h2.v;
                for (let i=0; i<h1.ks.length; i++) if (h1.ks[i] !== h2.ks[i]) return h1.ks[i] - h2.ks[i];
                return 0;
            }
            if (h1.rank === 4) return h1.hp - h2.hp || h1.lp - h2.lp || h1.k - h2.k;
            if (h1.rank === 5) {
                if (h1.p !== h2.p) return h1.p - h2.p;
                for (let i=0; i<h1.ks.length; i++) if (h1.ks[i] !== h2.ks[i]) return h1.ks[i] - h2.ks[i];
                return 0;
            }
            if (h1.rank === 6) {
                for (let i=0; i<h1.vs.length; i++) if (h1.vs[i] !== h2.vs[i]) return h1.vs[i] - h2.vs[i];
                return 0;
            }
            return 0;
        },

        aiAction() {
            const p = this.players[this.activeIdx];
            const rand = Math.random();

            if (this.state === 'PRE_DEAL') {
                const isP1 = this.activeIdx === this.getNextActive(this.dealerIdx);
                const isP2 = this.activeIdx === this.getNextActive(this.getNextActive(this.dealerIdx)); // This is not quite right if player count varies.
                // Re-calculating based on dealerIdx
                let p1Idx = this.getNextActive(this.dealerIdx);
                let p2Idx = this.getNextActive(p1Idx);
                const isDealer = this.activeIdx === this.dealerIdx;

                if (this.activeIdx === p1Idx) {
                    if (!p.hasRaisedThisTurn && rand < 0.70) this.action('raise_pre');
                    else if (!this.isDeckCut && rand < 0.35) this.action('cut');
                    else this.action('skip');
                } else if (this.activeIdx === p2Idx) {
                    const canRaise = (this.canRaiseChain && this.lastRaiserIdx !== -1);
                    if (rand < 0.35 && !this.isDeckCut) this.action('cut');
                    else if (rand < 0.60 && canRaise) this.action('raise_pre');
                    else if (rand < 0.80) this.action('double');
                    else this.action('skip');
                } else if (!isDealer) {
                    const canRaise = (this.canRaiseChain && this.lastRaiserIdx !== -1);
                    if (rand < 0.35 && !this.isDeckCut) this.action('cut');
                    else if (rand < 0.60 && canRaise) this.action('raise_pre');
                    else this.action('skip');
                } else {
                    const canRaise = (this.canRaiseChain && this.lastRaiserIdx !== -1);
                    if (rand < 0.30 && canRaise) this.action('raise_pre');
                    else this.action('skip');
                }
            } else if (this.state === 'DOUBLE_PAYMENT') {
                if (rand < 0.9) this.action('pay'); else this.action('out');
            } else if (this.state === 'DEALER_DECISION') {
                if (rand < 0.3) this.action('raise_pre'); else this.action('distribute');
            } else if (this.state === 'CHANGE_CARDS') {
                if (rand < 0.2) this.action('out');
                else if (rand < 0.45) this.action('change', [0, 1]);
                else if (rand < 0.70) this.action('change', [0]);
                else this.action('change', [0, 1, 2]);
            } else if (this.state === 'BETTING') {
                if (this.currentDealAmount === 0) {
                    if (rand < 0.5) this.action('deal_bet', 1); else this.action('pass_bet');
                } else {
                    if (rand < 0.2) this.action('out');
                    else if (rand < 0.5) this.action('raise_bet', 1);
                    else this.action('call_bet');
                }
            }
        },

        goHome() {
            this.resetEverything();
            ui.showScreen('screen-menu');
        },
        confirmQuit() { if(confirm("Quit game?")) this.goHome(); },
        resetEverything() {
            clearInterval(this.turnTimer);
            clearTimeout(audio.bgmTimeout);
            if (multiplayer.ws) multiplayer.ws.close();
            this.state = 'IDLE';
        }
    };

    // --- UI Logic ---
    const ui = {
        showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        },
        updatePhase(text) { document.getElementById('current-phase').textContent = text; },
        updateTimer(seconds) {
            document.getElementById('timer-display').textContent = seconds;
            const circle = document.getElementById('timer-svg');
            const offset = (seconds / 180) * 238;
            circle.style.strokeDashoffset = 238 - offset;
        },
        toast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateY(-20px)';
                setTimeout(() => t.remove(), 400);
            }, 3000);
            this.addHistory(msg);
        },
        addHistory(msg) {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = msg.replace(/\$(\d+)/g, '<span class="val">$$$1</span>');
            const list = document.getElementById('history-list');
            list.prepend(li);
        },
        toggleHistory() { document.getElementById('history-panel').classList.toggle('open'); },
        renderTable() {
            document.getElementById('pot-amount').textContent = `$${game.pot.toFixed(2)}`;
            if (game.state === 'IDLE') return;
            game.players.forEach((p, i) => {
                const el = document.getElementById(`p-${i}`);
                if (!el) return;
                const profit = p.money - 10;
                const profitText = profit === 0 ? `$0.00` : (profit > 0 ? `+$${profit.toFixed(2)}` : `-$${Math.abs(profit).toFixed(2)}`);
                const profitClass = profit === 0 ? 'profit-zero' : (profit > 0 ? 'profit-plus' : 'profit-minus');

                el.innerHTML = `
                    <div class="player-card ${game.activeIdx === i ? 'active' : ''} ${p.isEliminated ? 'eliminated' : ''}">
                        ${game.dealerIdx === i ? '<div class="dealer-badge">DEALER</div>' : ''}
                        <div class="avatar">${p.avatar}</div>
                        <div class="name">${p.name}</div>
                        <div class="money">$${p.money.toFixed(2)}</div>
                        <div class="profit ${profitClass}">${profitText}</div>
                        ${p.status ? `<div class="badge bg-red">${p.status}</div>` : ''}
                    </div>
                    <div class="hand" id="hand-${i}">
                        ${p.hand.map((c, idx) => `
                            <div class="card ${c.faceUp || i === game.myId ? '' : 'back'} ${c.color} ${p.cardsToChange.includes(idx) ? 'selected' : ''}"
                                 onclick="audio.mechanicalClick(); ui.selectCard(${i}, ${idx})">
                                <div class="top-left">${c.rank}<br>${c.suit}</div>
                                <div class="suit-center">${c.suit}</div>
                                <div class="bottom-right">${c.rank}<br>${c.suit}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            });
            this.renderControls();
        },
        highlightPlayer(idx) {
            document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active'));
            const p = document.getElementById(`p-${idx}`);
            if (p) p.querySelector('.player-card').classList.add('active');
        },
        selectCard(playerIdx, cardIdx) {
            if (game.state !== 'CHANGE_CARDS' || game.activeIdx !== game.myId || playerIdx !== game.myId) return;
            const p = game.players[game.myId];
            const pos = p.cardsToChange.indexOf(cardIdx);
            if (pos === -1) {
                if (p.cardsToChange.length < 3) p.cardsToChange.push(cardIdx);
            } else {
                p.cardsToChange.splice(pos, 1);
            }
            this.renderTable();
        },
        renderControls() {
            const container = document.getElementById('player-controls');
            container.innerHTML = '';
            if (game.activeIdx !== game.myId || game.state === 'IDLE') return;

            const p = game.players[game.myId];
            if (p.isOut || p.isEliminated) return;

            if (game.state === 'PRE_DEAL') {
                const p1Idx = game.getNextActive(game.dealerIdx);
                const p2Idx = game.getNextActive(p1Idx);
                const isP1 = game.activeIdx === p1Idx;
                const isP2 = game.activeIdx === p2Idx;

                if (isP2 && !p.hasRaisedThisTurn) container.innerHTML += `<button class="btn btn-gold" onclick="audio.mechanicalClick(); game.action('double')">💰 DOUBLE</button>`;

                const showRaise = !p.hasRaisedThisTurn && (isP1 || (game.canRaiseChain && game.lastRaiserIdx !== -1));
                if (showRaise) container.innerHTML += `<button class="btn" onclick="audio.mechanicalClick(); game.action('raise_pre')">⬆️ RAISE</button>`;

                if (game.activeIdx !== game.dealerIdx && !game.isDeckCut) container.innerHTML += `<button class="btn" onclick="audio.mechanicalClick(); game.action('cut')">✂️ CUT</button>`;
                container.innerHTML += `<button class="btn btn-red" onclick="audio.mechanicalClick(); game.action('skip')">⏭️ SKIP</button>`;
            } else if (game.state === 'DOUBLE_PAYMENT') {
                container.innerHTML += `<button class="btn btn-gold" onclick="audio.mechanicalClick(); game.action('pay')">✅ PAY $${game.entryAmount - p.paidThisRound}</button>`;
                container.innerHTML += `<button class="btn btn-red" onclick="audio.mechanicalClick(); game.action('out')">❌ OUT</button>`;
            } else if (game.state === 'DEALER_DECISION') {
                container.innerHTML += `<button class="btn btn-gold" onclick="audio.mechanicalClick(); game.action('distribute')">🎴 DISTRIBUTE</button>`;
                container.innerHTML += `<button class="btn" onclick="audio.mechanicalClick(); game.action('raise_pre')">⬆️ RAISE</button>`;
            } else if (game.state === 'CHANGE_CARDS') {
                const count = p.cardsToChange.length;
                const equalizer = game.highestPreGameBet - p.paidThisRound;
                const eqText = equalizer > 0 ? ` ($${equalizer.toFixed(2)})` : "";
                if (count > 0) container.innerHTML += `<button class="btn btn-gold" onclick="audio.mechanicalClick(); game.action('change', game.players[game.myId].cardsToChange)">🔄 CHANGE ${count}${eqText}</button>`;
                else container.innerHTML += `<button class="btn" onclick="audio.mechanicalClick(); game.action('keep')">⏭️ KEEP ALL${eqText}</button>`;
                container.innerHTML += `<button class="btn btn-red" onclick="audio.mechanicalClick(); game.action('out')">❌ OUT</button>`;
            } else if (game.state === 'BETTING') {
                if (game.currentDealAmount === 0) {
                    container.innerHTML += `<button class="btn btn-gold" onclick="audio.mechanicalClick(); game.action('deal_bet', 1)">💰 BET $1</button>`;
                    container.innerHTML += `<button class="btn" onclick="audio.mechanicalClick(); game.action('pass_bet')">⏭️ PASS</button>`;
                    container.innerHTML += `<button class="btn btn-red" onclick="audio.mechanicalClick(); game.action('out')">❌ OUT</button>`;
                } else {
                    container.innerHTML += `<button class="btn btn-gold" onclick="audio.mechanicalClick(); game.action('call_bet')">✅ PAY $${(game.currentDealAmount - p.paidThisRound).toFixed(2)}</button>`;
                    container.innerHTML += `<button class="btn" onclick="audio.mechanicalClick(); game.action('raise_bet', 1)">⬆️ RAISE $1</button>`;
                    container.innerHTML += `<button class="btn btn-red" onclick="audio.mechanicalClick(); game.action('out')">❌ OUT</button>`;
                }
            }
        },
        showWin(winner) {
            const over = document.getElementById('win-overlay');
            over.classList.remove('hidden');
            document.getElementById('win-player-name').textContent = winner.name;
            document.getElementById('win-hand-name').textContent = winner.finalHand.name;
            document.getElementById('win-amount').textContent = `+$${game.pot.toFixed(2)}`;

            // Highlight winner
            const winHand = document.getElementById(`hand-${winner.id}`);
            if (winHand) {
                winHand.querySelectorAll('.card').forEach(c => c.style.border = '4px solid var(--gold)');
                winHand.style.filter = 'drop-shadow(0 0 15px var(--gold))';
            }

            setTimeout(() => {
                over.classList.add('hidden');
                if (winHand) {
                    winHand.querySelectorAll('.card').forEach(c => c.style.border = '');
                    winHand.style.filter = '';
                }
            }, 4000);
        },
        animateFold(pIdx) {
            const hand = document.getElementById(`hand-${pIdx}`);
            if (!hand) return;
            const cards = hand.querySelectorAll('.card');
            cards.forEach((c, i) => {
                c.classList.remove('back');
                c.style.transition = "all 0.6s ease-in";
                c.style.transform = `translate(${(Math.random()-0.5)*100}px, ${(Math.random()-0.5)*100}px) rotate(${(Math.random()-0.5)*60}deg)`;
                c.style.opacity = "0.5";
            });
        },
        animateChips(from, to) {
            const table = document.getElementById('game-table');
            const rect = table.getBoundingClientRect();

            let startX, startY, endX, endY;

            if (from === 'pot') {
                startX = rect.width / 2;
                startY = rect.height / 2;
            } else {
                const el = document.getElementById(`p-${from}`);
                if (!el) return;
                const r = el.getBoundingClientRect();
                startX = r.left + r.width/2 - rect.left;
                startY = r.top + r.height/2 - rect.top;
            }

            if (to === 'pot') {
                endX = rect.width / 2;
                endY = rect.height / 2;
            } else {
                const el = document.getElementById(`p-${to}`);
                if (!el) return;
                const r = el.getBoundingClientRect();
                endX = r.left + r.width/2 - rect.left;
                endY = r.top + r.height/2 - rect.top;
            }

            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    const chip = document.createElement('div');
                    chip.className = 'chip-fly';
                    chip.style.left = startX + 'px';
                    chip.style.top = startY + 'px';
                    table.appendChild(chip);

                    chip.animate([
                        { left: startX + 'px', top: startY + 'px', transform: 'scale(1)' },
                        { left: endX + 'px', top: endY + 'px', transform: 'scale(0.8)' }
                    ], {
                        duration: 600,
                        easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                    }).onfinish = () => chip.remove();
                }, i * 100);
            }
        },
        async animateCut() {
            const table = document.getElementById('game-table');
            const cutDiv = document.createElement('div');
            cutDiv.style.cssText = "position:absolute; width:100px; height:120px; z-index:100;";
            cutDiv.innerHTML = `
                <div id="cut-top" class="card back" style="position:absolute; top:0; left:0; transition: all 1s;"></div>
                <div id="cut-bottom" class="card back" style="position:absolute; top:10px; left:5px; transition: all 1s;"></div>
            `;
            table.appendChild(cutDiv);
            audio.whoosh();
            await new Promise(r => setTimeout(r, 500));
            const top = document.getElementById('cut-top');
            const bottom = document.getElementById('cut-bottom');
            top.style.transform = "translateX(-80px) translateY(-20px) rotate(-10deg)";
            bottom.style.transform = "translateX(80px) translateY(20px) rotate(10deg)";
            await new Promise(r => setTimeout(r, 1000));
            top.style.zIndex = "1"; bottom.style.zIndex = "2";
            top.style.transform = "translateX(0) translateY(10px) rotate(0deg)";
            bottom.style.transform = "translateX(0) translateY(0) rotate(0deg)";
            await new Promise(r => setTimeout(r, 1000));
            audio.ding();
            cutDiv.remove();
        }
    };

    // --- Multiplayer Logic ---
    const multiplayer = {
        ws: null,
        roomCode: '',
        isHost: false,
        players: [],
        init() {
            ui.showScreen('screen-lobby');
            document.getElementById('lobby-join').classList.remove('hidden');
            document.getElementById('lobby-waiting').classList.add('hidden');
        },
        connect() {
            return new Promise((resolve) => {
                const apiKey = 'gMCuXPQO7OwaBJiPro9Eg2A05uftYZbIitwa2Uj1';
                this.ws = new WebSocket(`wss://free.blr2.piesocket.com/v3/1?api_key=${apiKey}`);
                this.ws.onopen = resolve;
                this.ws.onmessage = (e) => this.handleMessage(JSON.parse(e.data));
                this.ws.onclose = () => { ui.toast("⚠️ Disconnected"); game.goHome(); };
            });
        },
        async createRoom() {
            await this.connect();
            this.isHost = true;
            this.roomCode = Math.random().toString(36).substr(2, 6).toUpperCase();
            this.setupLobby();
        },
        async joinRoom() {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if (code.length !== 6) return ui.toast("Invalid Code");
            await this.connect();
            this.isHost = false;
            this.roomCode = code;
            this.setupLobby();
            this.send({ type: 'player_join', name: 'Player ' + Math.floor(Math.random()*100) });
        },
        setupLobby() {
            document.getElementById('lobby-join').classList.add('hidden');
            document.getElementById('lobby-waiting').classList.remove('hidden');
            document.getElementById('display-room-code').textContent = this.roomCode;
            this.players = [{ id: 0, name: 'You', isMe: true }];
            this.updateLobbyUI();
        },
        updateLobbyUI() {
            const list = document.getElementById('lobby-players-list');
            list.innerHTML = this.players.map(p => `<div class="avatar">👤</div>`).join('');
            document.getElementById('lobby-status').textContent = `Players: ${this.players.length}/4`;
            if (this.isHost && this.players.length >= 2) document.getElementById('btn-start-multi').classList.remove('hidden');
        },
        requestStart() { this.send({ type: 'start_game' }); },
        sendState() {
            this.send({
                type: 'sync_game_state',
                state: {
                    pot: game.pot,
                    dealerIdx: game.dealerIdx,
                    activeIdx: game.activeIdx,
                    state: game.state,
                    entryAmount: game.entryAmount,
                    isDeckCut: game.isDeckCut,
                    currentDealAmount: game.currentDealAmount,
                    lastRaiserIdx: game.lastRaiserIdx,
                    highestPreGameBet: game.highestPreGameBet,
                    cutQueued: game.cutQueued,
                    canRaiseChain: game.canRaiseChain,
                    players: game.players.map(p => ({
                        money: p.money,
                        paidThisRound: p.paidThisRound,
                        totalContributed: p.totalContributed,
                        isOut: p.isOut,
                        status: p.status,
                        hasCut: p.hasCut,
                        hand: p.hand
                    }))
                }
            });
        },
        send(data) { if(this.ws && this.ws.readyState === 1) { data.room = this.roomCode; this.ws.send(JSON.stringify(data)); } },
        handleMessage(data) {
            if (data.room !== this.roomCode) return;
            if (data.type === 'player_join' && this.isHost) {
                this.players.push({ id: this.players.length, name: data.name });
                this.send({ type: 'lobby_sync', players: this.players });
                this.updateLobbyUI();
            } else if (data.type === 'lobby_sync' && !this.isHost) {
                this.players = data.players;
                this.updateLobbyUI();
            } else if (data.type === 'start_game') {
                this.startActualGame();
            } else if (data.type === 'game_action') {
                if (data.pIdx !== game.myId) game.action(data.action, data.val, true);
            } else if (data.type === 'sync_game_state') {
                if (!this.isHost) this.syncState(data.state);
            }
        },
        syncState(s) {
            game.pot = s.pot;
            game.dealerIdx = s.dealerIdx;
            game.activeIdx = s.activeIdx;
            game.state = s.state;
            game.entryAmount = s.entryAmount;
            game.isDeckCut = s.isDeckCut;
            game.currentDealAmount = s.currentDealAmount;
            game.lastRaiserIdx = s.lastRaiserIdx;
            game.highestPreGameBet = s.highestPreGameBet;
            game.cutQueued = s.cutQueued;
            game.canRaiseChain = s.canRaiseChain;
            game.players.forEach((p, i) => {
                if (s.players[i]) {
                    p.money = s.players[i].money;
                    p.paidThisRound = s.players[i].paidThisRound;
                    p.totalContributed = s.players[i].totalContributed;
                    p.isOut = s.players[i].isOut;
                    p.status = s.players[i].status;
                    p.hasCut = s.players[i].hasCut;
                    if (s.players[i].hand) p.hand = s.players[i].hand;
                }
            });
            ui.renderTable();
        },
        startActualGame() {
            game.players = this.players.map((p, i) => ({
                id: i, name: p.isMe ? 'You' : p.name, avatar: '👤', isAI: false, money: 10, hand: [],
                isActive: true, isOut: false, isEliminated: false, hasCut: false, paidThisRound: 0, totalContributed: 0, status: '', cardsToChange: []
            }));
            game.myId = this.players.findIndex(p => p.isMe);
            ui.showScreen('screen-game');
            if (this.isHost) game.initRound();
        },
        leave() { if(this.ws) this.ws.close(); game.goHome(); }
    };

    // --- Init ---
    window.onload = () => {
        // Pre-cache or warm up audio
        document.body.addEventListener('click', () => audio.init(), { once: true });
    };

</script>
